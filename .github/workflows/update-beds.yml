name: Update emergency bed map

on:
  schedule:
    # GitHub 자체 스케줄은 지연·드롭될 수 있으므로 보조 안전망으로만 둔다.
    # 실제 주기 실행은 외부 cron이 repository_dispatch 또는 workflow_dispatch로 깨운다.
    - cron: "17 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [update-beds]

permissions:
  contents: write

concurrency:
  group: update-emergency-bed-map
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh emergency bed map
        run: python scripts/update_emergency_map.py

      - name: Commit refreshed map
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update emergency bed map"
          file_pattern: gwangju_emergency_map.html index.html
