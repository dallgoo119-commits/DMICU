name: Update emergency bed map

on:
  schedule:
    - cron: "7 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-emergency-bed-map
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh emergency bed map
        run: python scripts/update_emergency_map.py

      - name: Commit refreshed map
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update emergency bed map"
          file_pattern: gwangju_emergency_map.html index.html
