name: Update emergency bed map

on:
  schedule:
    # GitHub 스케줄은 부하 시 지연·드롭됨(실측: 하루 3~4회만 실행).
    # 30분 간격으로 시도해 실효 주기를 확보한다. concurrency가 중복 실행을 정리한다.
    - cron: "13,43 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-emergency-bed-map
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh emergency bed map
        run: python scripts/update_emergency_map.py

      - name: Commit refreshed map
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update emergency bed map"
          file_pattern: gwangju_emergency_map.html index.html
