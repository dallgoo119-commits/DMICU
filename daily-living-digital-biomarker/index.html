<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 확인</title>
<style>
  :root{--bg:#f6f5f1;--ink:#1a1d23;--muted:#686f7d;--line:#dedbd0;--accent:#185fa5;--card:#fff;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--ink);font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;}
  main{width:min(420px,calc(100vw - 32px));background:var(--card);border:1px solid var(--line);border-radius:8px;padding:28px;box-shadow:0 18px 50px rgba(30,30,30,.08)}
  h1{font-size:21px;margin:0 0 8px;letter-spacing:0;font-weight:760}
  p{margin:0 0 18px;color:var(--muted);line-height:1.6;font-size:14px}
  label{display:block;font-size:13px;font-weight:700;margin-bottom:8px}
  input{width:100%;height:44px;border:1px solid var(--line);border-radius:6px;padding:0 12px;font-size:16px;color:var(--ink);background:#fff}
  input:focus{outline:2px solid rgba(24,95,165,.2);border-color:var(--accent)}
  button{width:100%;height:44px;margin-top:12px;border:0;border-radius:6px;background:var(--accent);color:#fff;font-size:15px;font-weight:750;cursor:pointer}
  button:disabled{opacity:.65;cursor:wait}
  .error{min-height:22px;margin-top:10px;color:#a5432a;font-size:13px}
</style>
</head>
<body>
<main>
  <h1>비밀번호가 필요합니다</h1>
  <p>공유받은 비밀번호를 입력하면 문서가 열립니다.</p>
  <form id="gate">
    <label for="password">비밀번호</label>
    <input id="password" type="password" autocomplete="current-password" autofocus>
    <button id="openBtn" type="submit">열기</button>
    <div id="message" class="error" aria-live="polite"></div>
  </form>
</main>

function b64ToBytes(value){const binary=atob(value);const bytes=new Uint8Array(binary.length);for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);return bytes;}
async function deriveKey(password){const baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64ToBytes(saltB64),iterations:250000,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);}
async function unlock(password){const payload=b64ToBytes(payloadB64);const data=payload.slice(0,payload.length-16);const tag=payload.slice(payload.length-16);const combined=new Uint8Array(data.length+tag.length);combined.set(data);combined.set(tag,data.length);const key=await deriveKey(password);const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBytes(ivB64),tagLength:128},key,combined);return new TextDecoder().decode(plain);}
document.getElementById('gate').addEventListener('submit',async(event)=>{event.preventDefault();const button=document.getElementById('openBtn');const message=document.getElementById('message');const password=document.getElementById('password').value;message.textContent='';button.disabled=true;button.textContent=uiText.checking;try{const page=await unlock(password);document.open();document.write(page);document.close();}catch(error){message.textContent=uiText.wrong;button.disabled=false;button.textContent=uiText.button;}});
